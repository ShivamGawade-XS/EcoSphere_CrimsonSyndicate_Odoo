name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # never cancel in-flight deploys

jobs:
  # ─── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build for Production
    runs-on: ubuntu-latest
    outputs:
      deploy-url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (gate)
        run: npm run test

      - name: Build production bundle
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          NODE_ENV: production

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ${{ github.event.inputs.environment == 'preview' && '--prebuilt' || '--prod --prebuilt' }}
          working-directory: ./
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # ─── Post-Deploy Health Check ────────────────────────────────────────────────
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 20

      - name: Health check
        run: |
          DEPLOY_URL="${{ needs.build.outputs.deploy-url }}"
          echo "Checking deployment at: $DEPLOY_URL"

          # Retry up to 5 times with 10s delay
          for i in {1..5}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$DEPLOY_URL")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done

          echo "❌ Health check failed after 5 attempts"
          exit 1

  # ─── Discord Notification ─────────────────────────────────────────────────────
  notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: [build, health-check]
    if: always()
    steps:
      - name: Send Discord notification
        uses: sarisia/actions-status-discord@v1
        if: env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ needs.health-check.result == 'success' && 'success' || 'failure' }}
          title: "EcoSphere AI — Deployment"
          description: |
            **Branch:** `${{ github.ref_name }}`
            **Commit:** ${{ github.sha }}
            **Deploy URL:** ${{ needs.build.outputs.deploy-url }}
            **Status:** ${{ needs.health-check.result == 'success' && '✅ Deployed successfully' || '❌ Deployment failed' }}
          color: ${{ needs.health-check.result == 'success' && '0x10b981' || '0xef4444' }}
          username: "EcoSphere CI Bot"
