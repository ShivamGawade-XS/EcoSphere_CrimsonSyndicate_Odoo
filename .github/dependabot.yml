version: 2
updates:
  # ─── npm dependencies ─────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    target-branch: "develop"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
    reviewers:
      - "CrimsonSyndicate"
    groups:
      # Group all Radix UI updates into a single PR
      radix-ui:
        patterns:
          - "@radix-ui/*"
      # Group all Vitest/testing updates
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "jsdom"
      # Group Vite + plugins together
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      # Group React together (careful — major version bumps are breaking)
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
    ignore:
      # Avoid auto-updating to major breaking releases
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@supabase/supabase-js"
        update-types: ["version-update:semver-major"]

  # ─── GitHub Actions ───────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "UTC"
    open-pull-requests-limit: 5
    target-branch: "develop"
    commit-message:
      prefix: "ci(actions)"
    labels:
      - "github-actions"
      - "automated"
